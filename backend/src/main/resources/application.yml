server:
  port: 8080

spring:
  application:
    name: task-hub-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/task_hub?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.taskhub.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

task-hub:
  jwt:
    secret: TaskHubSecretKey2026PhyQxxTeamTaskTracker
    expiration: 86400000
  id:
    prefix: TT
    date-format: yyyyMMdd
